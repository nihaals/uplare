name: Build and release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
  pull_request:

jobs:
  pkl:
    runs-on: ubuntu-latest
    name: Create Pkl package
    steps:
      - name: Get Pkl version
        id: pkl-version
        shell: bash
        run: |
          set -euo pipefail
          version=$(curl -s "https://api.github.com/repos/apple/pkl/releases" | jq -r '.[].tag_name' | grep -E '^0\.31\.[0-9]+$' | sort -V | tail -n 1)
          echo "Found Pkl version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Install Pkl
        uses: pkl-community/setup-pkl@v0.0.8
        with:
          pkl-version: ${{ steps.pkl-version.outputs.version }}
      - uses: actions/checkout@v6
      - name: Resolve package version
        id: version
        working-directory: ./pkl
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v*.*.* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version=$(pkl eval --expression package.version PklProject | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+')
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid package version: '$version'"
            exit 1
          fi
          echo "Resolved package version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Create Pkl package
        working-directory: ./pkl
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v*.*.* ]]; then
            pkl project package
          else
            pkl project package --skip-publish-check
          fi
      - name: Verify package output directory
        run: |
          ls -al ./pkl/.out/
          ls -al ./pkl/.out/uplare@${{ steps.version.outputs.version }}/
      - name: Create package artifact
        uses: actions/upload-artifact@v7
        with:
          name: pkl-package
          path: ./pkl/.out/uplare@${{ steps.version.outputs.version }}/
          if-no-files-found: error

  rust-test:
    runs-on: ubuntu-latest
    name: Test Rust CLI
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        id: cargo-test
        continue-on-error: true
        run: cargo test
      - name: Check formatting
        id: cargo-fmt
        continue-on-error: true
        run: cargo fmt -- --check
      - name: Check clippy
        id: cargo-clippy
        continue-on-error: true
        run: cargo clippy -- -D warnings
      - name: Run publish dry run
        id: cargo-publish
        continue-on-error: true
        run: cargo publish --dry-run
      - name: Fail if any check failed
        if: ${{ contains(steps.*.outcome, 'failure') }}
        run: "false"

  rust-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-26-intel
            target: x86_64-apple-darwin
          - runs-on: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runs-on }}
    name: Build Rust - ${{ matrix.target }}
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }}
      - name: Smoke test
        run: |
          ./target/${{ matrix.target }}/release/uplare --version
          ./target/${{ matrix.target }}/release/uplare --help
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: uplare-${{ matrix.target }}
          path: ./target/${{ matrix.target }}/release/uplare
          if-no-files-found: error

  release:
    needs: [pkl, rust-build, rust-test]
    runs-on: ubuntu-latest
    name: Create GitHub release
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
      - name: Stage release assets
        run: |
          mkdir -p release-assets/
          cp pkl-package/* release-assets/
          cp uplare-x86_64-apple-darwin/uplare release-assets/uplare-cli-x86_64-apple-darwin
          cp uplare-aarch64-apple-darwin/uplare release-assets/uplare-cli-aarch64-apple-darwin
      - name: Verify staged release assets
        run: ls -al release-assets/
      - name: Create release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*
          fail_on_unmatched_files: true
          draft: true

  rust-publish:
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Publish Rust crate
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
